version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

  web:
    image: node:20-alpine
    working_dir: /workspace/apps/web_v2
    command: sh -c "corepack enable && corepack prepare yarn@4.12.0 --activate && yarn --version && yarn install && yarn dev --host 0.0.0.0 --port 5173"
    environment:
      VITE_USE_MOCK: "false"
      API_PROXY_TARGET: "http://api:8000"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "150"
      VITE_WATCH_POLLING: "true"
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/apps/web_v2/node_modules
    expose:
      - "5173"
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.secrets
    environment:
      APP_ENV: development
      OCR_PROVIDER: ${OCR_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_OCR_MODEL: ${OPENAI_OCR_MODEL:-gpt-4.1-mini}
      OPENAI_OCR_TIMEOUT_SECONDS: ${OPENAI_OCR_TIMEOUT_SECONDS:-45}
      OPENAI_MONTHLY_BUDGET_USD: ${OPENAI_MONTHLY_BUDGET_USD:-10}
      OPENAI_BUDGET_ALERT_THRESHOLD_USD: ${OPENAI_BUDGET_ALERT_THRESHOLD_USD:-8}
      OPENAI_BUDGET_HARD_STOP_USD: ${OPENAI_BUDGET_HARD_STOP_USD:-9.5}
    volumes:
      - ./data/media/tts:/app/media/tts
      - ./data/media/stt:/app/media/stt
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    env_file:
      - ./apps/api/.env.secrets
    environment:
      POSTGRES_DB: alignspeak
      POSTGRES_USER: alignspeak
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alignspeak -d alignspeak"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./apps/api
    command: ["python", "-c", "import time; print('worker placeholder started'); time.sleep(3600)"]
    env_file:
      - ./apps/api/.env.secrets
    environment:
      APP_ENV: development
      OCR_PROVIDER: ${OCR_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_OCR_MODEL: ${OPENAI_OCR_MODEL:-gpt-4.1-mini}
      OPENAI_OCR_TIMEOUT_SECONDS: ${OPENAI_OCR_TIMEOUT_SECONDS:-45}
      OPENAI_MONTHLY_BUDGET_USD: ${OPENAI_MONTHLY_BUDGET_USD:-10}
      OPENAI_BUDGET_ALERT_THRESHOLD_USD: ${OPENAI_BUDGET_ALERT_THRESHOLD_USD:-8}
      OPENAI_BUDGET_HARD_STOP_USD: ${OPENAI_BUDGET_HARD_STOP_USD:-9.5}
    volumes:
      - ./data/media/tts:/app/media/tts
      - ./data/media/stt:/app/media/stt
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - worker

volumes:
  pgdata:
  web_node_modules:

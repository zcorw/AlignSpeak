server {
    listen 80;
    server_name localhost;
    resolver 127.0.0.11 ipv6=off valid=10s;
    # Allow larger multipart uploads (multi-image OCR flow).
    client_max_body_size 64m;

    # Frontend - proxy to Vite dev server
    location / {
        set $web_upstream web:5173;
        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API - proxy to FastAPI
    location /api/ {
        # Use dynamic docker DNS lookup to avoid stale upstream IP after container restart.
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support for Vite HMR
    location /ws {
        set $web_upstream web:5173;
        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}

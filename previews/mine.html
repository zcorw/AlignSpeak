<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>我的 — AlignSpeak</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .page-body {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    /* Account section */
    .account-section {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .account-info { flex: 1; }
    .account-name { font-size: 16px; font-weight: 600; }
    .account-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .account-action {
      font-size: 13px;
      color: var(--text-3);
      cursor: pointer;
      border: none;
      background: none;
      transition: color 0.15s;
    }
    .account-action:hover { color: var(--text-2); }

    /* Filters */
    .filter-row {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: var(--r-full);
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 13px;
      color: var(--text-2);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .filter-chip.active {
      background: var(--accent-glow);
      border-color: rgba(110,96,238,0.4);
      color: var(--accent-2);
    }
    .filter-chip:hover:not(.active) { border-color: var(--border-2); color: var(--text); }

    /* Article list */
    .articles-list {
      display: flex;
      flex-direction: column;
      padding: 4px 20px 32px;
      gap: 10px;
    }
    .article-item {
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-decoration: none;
      gap: 10px;
    }
    .article-item:hover { border-color: var(--border-2); background: var(--card-2); }
    .article-item.active-article {
      border-color: rgba(110,96,238,0.4);
      background: rgba(110,96,238,0.04);
    }
    .article-row-top { display: flex; align-items: flex-start; gap: 12px; }
    .article-icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      background: var(--card-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .article-title-wrap { flex: 1; min-width: 0; }
    .article-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
    }
    .article-lang { font-size: 12px; color: var(--text-2); margin-top: 3px; }
    .article-level-badge {
      font-size: 12px;
      font-weight: 700;
      font-family: monospace;
      color: var(--accent-2);
      background: var(--accent-glow);
      padding: 3px 9px;
      border-radius: var(--r-full);
      border: 1px solid rgba(110,96,238,0.25);
      flex-shrink: 0;
    }
    .article-progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .article-progress-bar {
      flex: 1;
      height: 3px;
      background: var(--card-2);
      border-radius: 3px;
      overflow: hidden;
    }
    .article-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 3px;
    }
    .article-progress-label { font-size: 11px; color: var(--text-3); font-family: monospace; white-space: nowrap; }
    .article-meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .article-time { font-size: 12px; color: var(--text-3); }
    .article-complete-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--success);
      background: var(--success-bg);
      padding: 2px 8px;
      border-radius: var(--r-full);
    }
    .current-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--accent-2);
    }
    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 60px 32px;
      text-align: center;
      display: none;
    }
    .empty-icon { font-size: 40px; }
    .empty-text { font-size: 15px; color: var(--text-2); }
    /* Change password modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%;
      max-width: 430px;
      background: var(--surface);
      border-radius: var(--r) var(--r) 0 0;
      border: 1px solid var(--border-2);
      border-bottom: none;
      padding: 20px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-title { font-size: 16px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Topbar -->
    <div class="topbar">
      <a href="javascript:history.back()" class="icon-btn" title="返回">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </a>
      <span class="topbar-title">我的</span>
      <a href="import.html" class="btn btn-sm btn-primary" style="padding:7px 14px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
        新建
      </a>
    </div>

    <div class="page-body fade-up">
      <!-- Account -->
      <div class="account-section">
        <div class="avatar">张</div>
        <div class="account-info">
          <div class="account-name">张明</div>
          <div class="account-meta">共 3 篇文章 · 已练 42 次</div>
        </div>
        <button class="account-action" onclick="openChangePwd()">修改密码</button>
      </div>

      <!-- Filters -->
      <div class="filter-row">
        <button class="filter-chip active" onclick="setFilter(this,'all')">全部</button>
        <button class="filter-chip" onclick="setFilter(this,'en')">🇺🇸 英语</button>
        <button class="filter-chip" onclick="setFilter(this,'zh')">🇨🇳 中文</button>
        <button class="filter-chip" onclick="setFilter(this,'done')">✓ 已完成</button>
      </div>

      <!-- Articles list -->
      <div class="articles-list" id="articles-list"></div>
    </div>
  </div>

  <!-- Change password modal -->
  <div class="modal-backdrop" id="pwd-modal" onclick="closePwdOnBackdrop(event)">
    <div class="modal">
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="modal-title">修改密码</span>
        <span style="flex:1"></span>
        <button class="icon-btn" onclick="closeChangePwd()" style="background:transparent;border-color:transparent;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <input type="password" class="input" placeholder="当前密码" id="pwd-current">
        <input type="password" class="input" placeholder="新密码" id="pwd-new">
        <input type="password" class="input" placeholder="确认新密码" id="pwd-confirm">
      </div>
      <button class="btn btn-primary btn-full" onclick="submitPwd()">确认修改</button>
    </div>
  </div>

  <script>
    const ARTICLES = [
      {
        id: 'a1',
        title: 'The Little Prince — Chapter I',
        lang: 'en',
        langLabel: '英语',
        langFlag: '🇺🇸',
        icon: '📖',
        level: 2,
        segment: 3,
        totalSegments: 5,
        lastPracticed: '今天',
        progress: 0.4,
        isActive: true,
        isDone: false,
        practiceCount: 18,
      },
      {
        id: 'a2',
        title: 'Pride and Prejudice — Opening',
        lang: 'en',
        langLabel: '英语',
        langFlag: '🇺🇸',
        icon: '📗',
        level: 1,
        segment: 2,
        totalSegments: 4,
        lastPracticed: '2天前',
        progress: 0.5,
        isActive: false,
        isDone: false,
        practiceCount: 14,
      },
      {
        id: 'a3',
        title: '《围城》第一章节选',
        lang: 'zh',
        langLabel: '中文',
        langFlag: '🇨🇳',
        icon: '📕',
        level: 4,
        segment: 8,
        totalSegments: 8,
        lastPracticed: '13天前',
        progress: 1,
        isActive: false,
        isDone: true,
        practiceCount: 32,
      },
    ];

    let currentFilter = 'all';

    function setFilter(el, filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      renderList();
    }

    function renderList() {
      const container = document.getElementById('articles-list');
      let filtered = ARTICLES;
      if (currentFilter === 'en') filtered = ARTICLES.filter(a => a.lang === 'en');
      else if (currentFilter === 'zh') filtered = ARTICLES.filter(a => a.lang === 'zh');
      else if (currentFilter === 'done') filtered = ARTICLES.filter(a => a.isDone);

      if (filtered.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:48px 24px;color:var(--text-3);font-size:14px;">暂无文章</div>`;
        return;
      }

      container.innerHTML = filtered.map(a => `
        <a href="practice.html?a=${a.id}" class="article-item ${a.isActive ? 'active-article' : ''}">
          <div class="article-row-top">
            <div class="article-icon">${a.icon}</div>
            <div class="article-title-wrap">
              <div class="article-title">${a.title}</div>
              <div class="article-lang">${a.langFlag} ${a.langLabel}</div>
            </div>
            <div class="article-level-badge">${a.isDone ? '完成' : 'L' + a.level}</div>
          </div>
          <div class="article-progress-row">
            <div class="article-progress-bar">
              <div class="article-progress-fill" style="width:${a.progress * 100}%"></div>
            </div>
            <span class="article-progress-label">${a.isDone ? '全部达标' : `§${a.segment}/${a.totalSegments}`}</span>
          </div>
          <div class="article-meta-row">
            <span class="article-time">上次练习：${a.lastPracticed}</span>
            <span style="color:var(--text-3)">·</span>
            <span class="article-time">练习 ${a.practiceCount} 次</span>
            ${a.isDone ? `<span class="article-complete-badge">✓ 已完成</span>` : ''}
            ${a.isActive ? `<span class="current-indicator">▶ 当前</span>` : ''}
          </div>
        </a>
      `).join('');
    }

    function openChangePwd() {
      document.getElementById('pwd-modal').classList.add('open');
    }

    function closeChangePwd() {
      document.getElementById('pwd-modal').classList.remove('open');
    }

    function closePwdOnBackdrop(e) {
      if (e.target === e.currentTarget) closeChangePwd();
    }

    function submitPwd() {
      const curr = document.getElementById('pwd-current').value;
      const n = document.getElementById('pwd-new').value;
      const c = document.getElementById('pwd-confirm').value;
      if (!curr || !n || !c) return;
      if (n !== c) { alert('两次密码不一致'); return; }
      closeChangePwd();
      // Reset fields
      ['pwd-current','pwd-new','pwd-confirm'].forEach(id => document.getElementById(id).value = '');
    }

    renderList();
  </script>
</body>
</html>

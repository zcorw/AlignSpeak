<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AlignSpeak Previews</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { padding: 20px; }
    .preview-nav {
      max-width: 600px;
      margin: 0 auto;
    }
    .preview-nav h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .preview-nav p {
      color: var(--text-2);
      margin-bottom: 32px;
    }
    .preview-section {
      margin-bottom: 32px;
    }
    .preview-section h2 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 12px;
    }
    .preview-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .preview-link {
      display: block;
      padding: 14px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      text-decoration: none;
      transition: all 0.15s;
    }
    .preview-link:hover {
      background: var(--card-2);
      border-color: var(--border-2);
    }
  </style>
</head>
<body>
  <div class="preview-nav fade-up">
    <h1>AlignSpeak Previews</h1>
    <p>页面原型预览</p>

    <div class="preview-section">
      <h2>认证流程</h2>
      <div class="preview-list">
        <a href="auth-login.html" class="preview-link">登录页</a>
        <a href="auth-register.html" class="preview-link">注册页</a>
        <a href="auth-verify.html" class="preview-link">邮箱验证页</a>
      </div>
    </div>

    <div class="preview-section">
      <h2>主流程</h2>
      <div class="preview-list">
        <a href="start.html" class="preview-link">开始页</a>
        <a href="import.html" class="preview-link">文章导入页</a>
        <a href="practice.html" class="preview-link">练习页</a>
        <a href="result.html" class="preview-link">结果页</a>
        <a href="mine.html" class="preview-link">我的页面</a>
      </div>
    </div>
  </div>
</body>
</html>

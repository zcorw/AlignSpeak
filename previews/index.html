<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AlignSpeak</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { align-items: center; justify-content: center; min-height: 100svh; }
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 24px var(--accent-glow);
    }
    .logo-text {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo-text span { color: var(--accent-2); }
    .loading-dots {
      display: flex;
      gap: 6px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-3);
      animation: dot-bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    .tagline { font-size: 14px; color: var(--text-3); letter-spacing: 0.3px; }
  </style>
</head>
<body>
  <div class="splash fade-up">
    <div class="logo">
      <div class="logo-icon">🎯</div>
      <div class="logo-text">Align<span>Speak</span></div>
    </div>
    <p class="tagline">专注跟读，精准提升</p>
    <div class="loading-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <script>
    // 模拟：有历史进度 → 进入开始页；无历史 → 进入导入页
    const hasHistory = true;
    setTimeout(() => {
      window.location.href = hasHistory ? 'start.html' : 'import.html';
    }, 1800);
  </script>
</body>
</html>

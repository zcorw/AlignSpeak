<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - AlignSpeak</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Login Screen -->
    <div class="page fade-up">
      <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="card" style="width: 100%; max-width: 400px;">
          <div style="padding: 24px;">
            <h1 style="font-size: 24px; font-weight: 700; margin: 0 0 8px 0;">Sign In to AlignSpeak</h1>
            <p class="caption" style="margin: 0 0 24px 0;">Use your email and password to continue.</p>

            <div style="margin: 0 0 18px 0; padding: 14px; border-radius: 12px; border: 1px solid rgba(110,96,238,0.28); background: linear-gradient(140deg, rgba(110,96,238,0.18), rgba(29,201,138,0.08));">
              <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                <svg viewBox="0 0 40 40" width="34" height="34" aria-hidden="true" style="flex-shrink: 0;">
                  <defs>
                    <linearGradient id="preview-logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="#7f72ff"></stop>
                      <stop offset="100%" stop-color="#22d8a4"></stop>
                    </linearGradient>
                  </defs>
                  <circle cx="20" cy="20" r="18" fill="none" stroke="url(#preview-logo-gradient)" stroke-width="2.2"></circle>
                  <path d="M11 23c2.2-5.8 5.8-8.6 9-8.6 3.6 0 6.4 2.4 9 8.6" fill="none" stroke="#c5beff" stroke-width="2.1" stroke-linecap="round"></path>
                  <circle cx="14" cy="17.5" r="2.2" fill="#8f84ff"></circle>
                  <circle cx="26" cy="17.5" r="2.2" fill="#24d2a3"></circle>
                </svg>
                <div>
                  <div style="font-size: 15px; font-weight: 700; line-height: 1.2;">AlignSpeak</div>
                  <div class="caption" style="font-size: 12px; line-height: 1.3;">Article Shadowing Studio</div>
                </div>
              </div>
              <p class="caption" style="margin: 0; font-size: 12px;">Practice speaking with article-based shadowing and instant alignment feedback.</p>
            </div>

            <form style="display: flex; flex-direction: column; gap: 16px;">
              <div>
                <label class="label" style="display: block; margin-bottom: 6px;">EMAIL</label>
                <input
                  type="email"
                  class="input"
                  placeholder="you@example.com"
                  required
                  autocomplete="email"
                >
              </div>

              <div>
                <label class="label" style="display: block; margin-bottom: 6px;">PASSWORD</label>
                <input
                  type="password"
                  class="input"
                  placeholder="••••••••"
                  required
                  autocomplete="current-password"
                >
              </div>

              <!-- Error message (hidden by default) -->
              <div style="display: none; padding: 12px; background: var(--danger-bg); border: 1px solid rgba(240,82,82,0.3); border-radius: var(--r-sm); color: var(--danger); font-size: 14px;">
                Invalid email or password.
              </div>

              <button type="submit" class="btn btn-primary btn-full">
                Sign In
              </button>

              <button type="button" class="btn btn-ghost btn-full" onclick="window.location.href='auth-register.html'">
                No account yet? Create one
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

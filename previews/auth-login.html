<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlignSpeak - 登录预览</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./ui.js"></script>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="brand">AlignSpeak</div>
        <nav class="nav">
          <a href="./index.html">总览</a>
          <a class="active" href="./auth-login.html">登录</a>
          <a href="./auth-register.html">注册</a>
          <a href="./workspace.html">文章工作台</a>
          <a href="./practice.html">练习页</a>
          <a href="./progress.html">进度页</a>
        </nav>
      </header>

      <section class="split" style="margin-top: 20px">
        <div class="card stagger">
          <span class="chip">Account System</span>
          <h1 style="margin-top: 10px">回来继续练习</h1>
          <p class="muted">登录后恢复你的段落进度、遮挡级别和常错词统计。</p>
          <div class="grid cols-2">
            <div class="card">
              <div class="kpi">
                <span class="muted">本周练习</span>
                <strong>17 次</strong>
              </div>
            </div>
            <div class="card">
              <div class="kpi">
                <span class="muted">平均准确率</span>
                <strong>86%</strong>
              </div>
            </div>
          </div>
        </div>

        <div class="card stagger">
          <h3>账号登录</h3>
          <form class="form">
            <div class="field">
              <label>邮箱</label>
              <input type="email" placeholder="you@example.com" />
            </div>
            <div class="field">
              <label>密码</label>
              <input type="password" placeholder="请输入密码" />
            </div>
            <div class="actions">
              <button type="button" class="btn primary">登录</button>
              <button type="button" class="btn ghost">忘记密码</button>
            </div>
          </form>
          <p class="muted" style="margin-top: 14px">
            还没有账号？<a href="./auth-register.html" style="color: var(--accent)">去注册</a>
          </p>
        </div>
      </section>
    </div>
  </body>
</html>

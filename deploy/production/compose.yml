services:
  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      TTS_MEDIA_DIR: /app/media/tts
      STT_MEDIA_DIR: /app/media/stt
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - ./data/media/tts:/app/media/tts
      - ./data/media/stt:/app/media/stt
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')\""]
      interval: 30s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: alignspeak
      POSTGRES_USER: alignspeak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alignspeak -d alignspeak"]
      interval: 10s
      timeout: 5s
      retries: 10

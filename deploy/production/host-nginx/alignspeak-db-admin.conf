server {
    listen 80;
    server_name db-admin.example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name db-admin.example.com;

    ssl_certificate /etc/letsencrypt/live/db-admin.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/db-admin.example.com/privkey.pem;

    client_max_body_size 20m;

    # Restrict access before exposing the database admin UI.
    allow 127.0.0.1;
    # allow 203.0.113.10/32;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:18080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Published image tag to deploy
        required: true
        default: main

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute deployment metadata
        id: meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            image_tag="${{ inputs.image_tag }}"
          else
            image_tag="${GITHUB_SHA}"
          fi
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/$owner/alignspeak-web" >> "$GITHUB_OUTPUT"
          echo "api_image=ghcr.io/$owner/alignspeak-api" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web_v2
          file: ./apps/web_v2/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.web_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.web_image }}:main

      - name: Build and push api image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.api_image }}:main

      - name: Prepare deployment bundle
        shell: bash
        run: |
          mkdir -p deploy_bundle
          cp deploy/production/compose.yml deploy_bundle/compose.yml
          cat > deploy_bundle/images.env <<EOF
          WEB_IMAGE=${{ steps.meta.outputs.web_image }}:${{ steps.meta.outputs.image_tag }}
          API_IMAGE=${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.image_tag }}
          EOF

      - name: Upload deployment bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy_bundle/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,GHCR_USERNAME,GHCR_PAT
          script: |
            set -eu
            mkdir -p "$DEPLOY_PATH"/data/postgres "$DEPLOY_PATH"/data/media/tts "$DEPLOY_PATH"/data/media/stt
            cd "$DEPLOY_PATH"

            if [ -f images.env ]; then
              mv images.env .images.env
            fi

            test -f .env.production || { echo "Missing .env.production"; exit 1; }
            test -f .images.env || { echo "Missing .images.env"; exit 1; }

            if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_PAT:-}" ]; then
              echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            set -a
            . ./.env.production
            . ./.images.env
            set +a

            docker compose -f compose.yml pull
            docker compose -f compose.yml up -d --remove-orphans

            api_container="$(docker compose -f compose.yml ps -q api)"
            if [ -z "$api_container" ]; then
              echo "API container was not created"
              exit 1
            fi

            for attempt in $(seq 1 20); do
              status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$api_container")"
              if [ "$status" = "healthy" ]; then
                exit 0
              fi
              sleep 3
            done

            docker compose -f compose.yml ps
            exit 1
